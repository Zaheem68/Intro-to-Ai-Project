<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>15-Queens (Python Backend)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f; --surface: #111318; --surface2: #181c24; --surface3: #1f2430;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0; --text2: #8b91a8; --text3: #555c72;
    --accent: #6c8fff; --accent2: #3a5fe8;
    --success: #3dd68c; --success-bg: rgba(61,214,140,0.1);
    --error: #ff5f5f; --error-bg: rgba(255,95,95,0.1);
    --warn: #f5a623; --warn-bg: rgba(245,166,35,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; }
  .logo span { color: var(--accent); }
  main { flex: 1; display: grid; grid-template-columns: 1fr 340px; height: calc(100vh - 57px); overflow: hidden; }
  .board-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; gap: 16px; }
  .board-status-bar { width: 100%; max-width: 620px; display: flex; align-items: center; justify-content: space-between; }
  .status-pill { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 24px; font-size: 13px; font-weight: 500; border: 1px solid var(--border2); background: var(--surface2); }
  .status-pill.running { border-color: rgba(108,143,255,0.4); color: var(--accent); background: rgba(108,143,255,0.08); }
  .status-pill.failed { border-color: rgba(255,95,95,0.4); color: var(--error); background: var(--error-bg); }
  .status-pill.manual { border-color: rgba(245,166,35,0.4); color: var(--warn); background: var(--warn-bg); }
  .status-pill.solved { border-color: rgba(61,214,140,0.4); color: var(--success); background: var(--success-bg); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .speed-control { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
  #board-wrap { position: relative; flex-shrink: 0; }
  canvas#board { border-radius: 8px; border: 1px solid var(--border2); box-shadow: 0 0 40px rgba(0,0,0,0.6); cursor: pointer; }
  .sidebar { background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .sidebar-section { padding: 20px; border-bottom: 1px solid var(--border); }
  .section-label { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 14px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .stat-val { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; }
  .btn { width: 100%; padding: 11px 16px; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; border: none; display: flex; justify-content: center; gap: 8px; margin-bottom:8px;}
  .btn-primary { background: var(--accent2); color: white; }
  .btn-warning { background: var(--warn); color: black; }
  .btn-danger { background: var(--error-bg); color: var(--error); border: 1px solid rgba(255,95,95,0.2); }
  .log-area { flex: 1; padding: 16px 20px; overflow-y: auto; min-height: 140px; }
  .log-entry { display: flex; gap: 8px; padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .log-time { font-family: 'Space Mono', monospace; color: var(--text3); font-size: 10px; min-width: 36px; }
  .log-msg { color: var(--text2); line-height: 1.4; }
  .alert-banner { margin: 0 20px 12px; padding: 10px 14px; border-radius: 8px; font-size: 12px; display: none; }
  .alert-banner.show { display: block; }
  .alert-banner.error { background: var(--error-bg); border: 1px solid rgba(255,95,95,0.25); color: var(--error); }
  .alert-banner.success { background: var(--success-bg); border: 1px solid rgba(61,214,140,0.25); color: var(--success); }
</style>
</head>
<body>

<header>
  <div class="logo"><span>♛</span><span>15x15 <span>Python Powered Solver</span></span></div>
  <div class="logo"><span style="color:var(--text3); font-size: 12px;">Powered by Flask</span></div>
</header>

<main>
  <div class="board-area">
    <div class="board-status-bar">
      <div class="status-pill idle" id="status-pill"><div class="dot" id="status-dot"></div><span id="status-text">Ready. Server Connected.</span></div>
      <div class="speed-control"><span>Speed</span><input type="range" min="1" max="5" value="3" id="speed-slider"></div>
    </div>
    <div id="board-wrap"><canvas id="board"></canvas></div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Dashboard Metrics</div>
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="sv-queens" style="color:var(--accent)">0 / 15</div><div class="stat-label">Queens Placed</div></div>
        <div class="stat-card"><div class="stat-val" id="sv-time" style="color:var(--warn)">0.00ms</div><div class="stat-label">Python Backend Time</div></div>
        <div class="stat-card"><div class="stat-val" id="sv-steps">0</div><div class="stat-label">Algorithmic Steps</div></div>
        <div class="stat-card"><div class="stat-val" id="sv-status">Ready</div><div class="stat-label">Engine Status</div></div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Controls</div>
      <button class="btn btn-primary" id="btn-solve">▶ Auto Run Visualizer</button>
      <button class="btn btn-warning" id="btn-instant">⚡ Instant Result</button>
      <button class="btn btn-danger" id="btn-reset">↺ Reset Board</button>
    </div>
    <div class="alert-banner" id="alert-banner"></div>
    <div class="log-area" id="log-area"></div>
  </aside>
</main>

<script>
const N = 15;
let CELL = 38;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');

let queens = [];
let lockedInitialQueens = []; 
let state = 'idle'; 
let solveSteps = [];
let stepIdx = 0;
let solveTimer = null;
let hoverCell = null;

function initBoard() {
  const maxW = Math.min(window.innerWidth - 380, window.innerHeight - 120);
  CELL = Math.max(28, Math.floor(maxW / N));
  canvas.width = CELL * N; canvas.height = CELL * N;
  drawBoard();
}

function cellColor(r, c) { return (r + c) % 2 === 0 ? '#1a2235' : '#131824'; }

function getAttackedCells(currentQueens) {
  const attacked = new Set();
  for (const [qr, qc] of currentQueens) {
    for (let c = 0; c < N; c++) if (c !== qc) attacked.add(`${qr},${c}`);
    for (let r = 0; r < N; r++) if (r !== qr) attacked.add(`${r},${qc}`);
    for (let d = -N; d <= N; d++) {
      if (d === 0) continue;
      const nr = qr + d, nc = qc + d;
      if (nr >= 0 && nr < N && nc >= 0 && nc < N) attacked.add(`${nr},${nc}`);
      const nr2 = qr + d, nc2 = qc - d;
      if (nr2 >= 0 && nr2 < N && nc2 >= 0 && nc2 < N) attacked.add(`${nr2},${nc2}`);
    }
  }
  return attacked;
}

function drawBoard(highlightCell = null, isError = false) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const attacked = getAttackedCells(queens);
  
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      ctx.fillStyle = cellColor(r, c);
      ctx.fillRect(c * CELL, r * CELL, CELL, CELL);

      if (attacked.has(`${r},${c}`) && (state === 'idle' || state === 'manual' || isError)) {
        ctx.fillStyle = 'rgba(255,95,95,0.15)'; 
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
      if (hoverCell && hoverCell[0] === r && hoverCell[1] === c && state !== 'running') {
        ctx.fillStyle = 'rgba(108,143,255,0.2)';
        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  for (const [r, c] of queens) {
    const isLocked = lockedInitialQueens.some(q => q[0] === r && q[1] === c);
    ctx.font = `bold ${CELL * 0.55}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    
    if (attacked.has(`${r},${c}`) && (state === 'idle' || state === 'manual')) {
      ctx.shadowColor = 'rgba(255,95,95,0.8)'; ctx.shadowBlur = 12; ctx.fillStyle = '#ff5f5f';
    } else if (isLocked && state === 'running') {
      ctx.shadowColor = 'rgba(108,143,255,0.5)'; ctx.shadowBlur = 8; ctx.fillStyle = '#8ba8ff'; 
    } else {
      ctx.shadowColor = 'rgba(61,214,140,0.5)'; ctx.shadowBlur = 8; ctx.fillStyle = '#3dd68c';
    }
    ctx.fillText('♛', c * CELL + CELL / 2, r * CELL + CELL / 2 + 1);
    ctx.shadowBlur = 0;
  }
  
  if (highlightCell && !isError) {
    ctx.fillStyle = 'rgba(108,143,255,0.3)';
    ctx.fillRect(highlightCell[1] * CELL, highlightCell[0] * CELL, CELL, CELL);
  }
}

// Mouse Interactions
canvas.addEventListener('mousemove', (e) => {
  if (state === 'running') return;
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor(((e.clientX - rect.left) * (canvas.width / rect.width)) / CELL);
  const r = Math.floor(((e.clientY - rect.top) * (canvas.height / rect.height)) / CELL);
  if (r >= 0 && r < N && c >= 0 && c < N) { hoverCell = [r, c]; drawBoard(); }
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; drawBoard(); });

canvas.addEventListener('click', () => {
  if (state === 'running') return; 
  if (hoverCell) {
    state = 'manual';
    const [r, c] = hoverCell;
    const existingIdx = queens.findIndex(q => q[0] === r && q[1] === c);
    
    if (existingIdx !== -1) {
      queens.splice(existingIdx, 1);
    } else if (queens.length < 15) {
      queens.push([r, c]);
    }
    updateUI(); drawBoard();
  }
});

function updateUI() {
  document.getElementById('sv-queens').textContent = `${queens.length} / 15`;
}

function logMsg(msg, color = '') {
  const t = new Date().toISOString().substring(14, 21);
  const colorCode = color === 'success' ? '#3dd68c' : color === 'error' ? '#ff5f5f' : '#8b91a8';
  document.getElementById('log-area').insertAdjacentHTML('afterbegin', `<div class="log-entry"><span class="log-time">${t}</span><span style="color:${colorCode}">${msg}</span></div>`);
}

// --- PYTHON BACKEND COMMUNICATION ---
async function fetchStepsFromPython() {
  lockedInitialQueens = queens.map(q => [...q]);
  document.getElementById('status-pill').className = 'status-pill running';
  document.getElementById('status-text').textContent = 'Python is Computing...';
  
  try {
    const response = await fetch('/api/solve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ queens: lockedInitialQueens })
    });
    const data = await response.json();
    solveSteps = data.steps;
    document.getElementById('sv-time').textContent = data.computeTimeMs.toFixed(2) + 'ms';
    return true;
  } catch (error) {
    logMsg('Server communication failed!', 'error');
    return false;
  }
}

function processStep(step, stepsCount) {
  document.getElementById('sv-steps').textContent = stepsCount;
  
  if (['try', 'place', 'backtrack'].includes(step.type)) {
    queens = step.queensSnap; drawBoard([step.r, step.c]); updateUI();
  } else if (step.type === 'solved') {
    clearInterval(solveTimer); state = 'solved'; queens = step.queensSnap; updateUI(); drawBoard(null, false);
    document.getElementById('status-pill').className = 'status-pill solved';
    document.getElementById('status-text').textContent = "Algorithm Completed!";
    logMsg('Python Engine found a valid solution.', 'success');
  } else if (step.type === 'unsolvable_manual') {
    clearInterval(solveTimer); state = 'failed';
    document.getElementById('status-pill').className = 'status-pill failed';
    document.getElementById('status-text').textContent = "Dead End";
    logMsg('Execution halted: Dead-end caused by manual placement.', 'error');
    drawBoard();
  }
}

document.getElementById('btn-solve').addEventListener('click', async () => {
  if (state === 'running') return;
  state = 'running'; stepIdx = 0;
  
  const success = await fetchStepsFromPython();
  if (!success) { state = 'idle'; return; }
  
  const speed = [0, 250, 100, 25, 2, 0][document.getElementById('speed-slider').value];
  solveTimer = setInterval(() => {
    if (stepIdx < solveSteps.length) {
      processStep(solveSteps[stepIdx], stepIdx + 1);
      stepIdx++;
    } else {
      clearInterval(solveTimer);
    }
  }, speed);
});

document.getElementById('btn-instant').addEventListener('click', async () => {
  if (state === 'running') clearInterval(solveTimer);
  state = 'running';
  
  const success = await fetchStepsFromPython();
  if (!success) { state = 'idle'; return; }
  
  const lastStep = solveSteps[solveSteps.length - 1];
  processStep(lastStep, solveSteps.length);
});

document.getElementById('btn-reset').addEventListener('click', () => {
  clearInterval(solveTimer);
  queens = []; lockedInitialQueens = []; state = 'idle'; solveSteps = []; stepIdx = 0;
  document.getElementById('status-pill').className = 'status-pill idle';
  document.getElementById('status-text').textContent = 'Ready. Server Connected.';
  document.getElementById('sv-time').textContent = '0.00ms';
  document.getElementById('sv-steps').textContent = '0';
  updateUI(); drawBoard();
});

initBoard();
</script>
</body>
</html>
